<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description" content="Mind-Match: SCC-based community detection and real-time graph visualization platform">
  <title>Mind-Match</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<!-- ═══ TOP BAR ═══ -->
<header class="topbar">
  <div class="topbar-brand">
    <div class="brand-mark"></div>
    <span>Mind-Match</span>
  </div>
  <nav class="topbar-nav" id="topNav">
    <button class="active" data-action="graph">Graph</button>
    <button data-action="adduser">Add User</button>
    <button data-action="intelligence">Intelligence</button>
    <button data-action="analytics">Analytics</button>
    <button data-action="crosschat">Cross-Chat</button>
    <button data-action="recompute">Recompute SCC</button>
  </nav>
  <div class="topbar-status">
    <div class="status-badge"><span class="dot"></span> Engine Online</div>
    <div class="status-badge" id="statusUsers">— users</div>
    <div class="status-badge" id="statusEdges">— edges</div>
    <div class="status-badge" id="statusComm">— communities</div>
    <div class="status-badge" id="statusDensity">— density</div>
  </div>
</header>

<!-- ═══ MAIN ═══ -->
<div class="app-main">

  <!-- LEFT: Graph -->
  <div class="graph-area" id="graphArea">
    <svg id="graphSvg"></svg>

    <!-- HUD bottom-left -->
    <div class="graph-hud">
      <div class="hud-legend" id="graphLegend"></div>
      <div class="hud-metrics" id="graphMetrics"></div>
    </div>

    <!-- Toolbar top-right -->
    <div class="graph-toolbar">
      <button onclick="Graph.zoomFit()">Fit</button>
      <button onclick="Graph.resetHighlight()">Reset</button>
      <button onclick="Graph.loadData()">Refresh</button>
    </div>

    <!-- Simulation bar bottom-right -->
    <div class="sim-bar" id="simBar">
      <div class="sim-group">
        <span class="sim-label">Add</span>
        <button class="sim-btn add" onclick="App.simulate('add',10)">+10</button>
        <button class="sim-btn add" onclick="App.simulate('add',50)">+50</button>
        <button class="sim-btn add" onclick="App.simulate('add',100)">+100</button>
      </div>
      <div class="sim-group">
        <span class="sim-label">Remove</span>
        <button class="sim-btn rm" onclick="App.simulate('remove',10)">−10</button>
        <button class="sim-btn rm" onclick="App.simulate('remove',50)">−50</button>
        <button class="sim-btn rm" onclick="App.simulate('remove',100)">−100</button>
      </div>
      <div class="sim-divider"></div>
      <button class="sim-btn evo" id="evoBtn" onclick="App.toggleEvolution()">▶ Start Sim</button>
      <div id="evoIndicator" class="evo-indicator" style="display:none">
        <span class="evo-pulse"></span> Simulating...
      </div>
    </div>

    <!-- Event log -->
    <div class="event-log" id="eventLog"></div>
  </div>

  <!-- RIGHT: Panel -->
  <aside class="right-panel" id="rightPanel">
    <div class="panel-tabs" id="panelTabs">
      <button class="panel-tab active" data-tab="info">Info</button>
      <button class="panel-tab" data-tab="community">Community</button>
      <button class="panel-tab" data-tab="chat">Chat</button>
    </div>
    <div class="panel-content" id="panelContent">
      <div class="panel-view active" id="tab-info">
        <div style="text-align:center;padding:40px 0;color:var(--text-sec)">
          <div style="font-size:24px;margin-bottom:8px;opacity:0.4">⬤</div>
          <p style="font-size:12px">Click a node in the graph<br>to view details</p>
        </div>
      </div>
      <div class="panel-view" id="tab-community"></div>
      <div class="panel-view" id="tab-chat"></div>
    </div>
  </aside>
</div>

<!-- ═══ OVERLAY: Add User ═══ -->
<div class="overlay-panel" id="overlayAddUser">
  <div class="overlay-box">
    <button class="overlay-close" onclick="App.closeOverlay('overlayAddUser')">✕</button>
    <div id="addUserBody"></div>
  </div>
</div>

<!-- ═══ OVERLAY: Analytics ═══ -->
<div class="overlay-panel" id="overlayAnalytics">
  <div class="overlay-box" style="width:640px">
    <button class="overlay-close" onclick="App.closeOverlay('overlayAnalytics')">✕</button>
    <div id="analyticsBody"></div>
  </div>
</div>

<!-- ═══ OVERLAY: Intelligence ═══ -->
<div class="overlay-panel" id="overlayIntelligence">
  <div class="overlay-box" style="width:580px">
    <button class="overlay-close" onclick="App.closeOverlay('overlayIntelligence')">✕</button>
    <div id="intelligenceBody"></div>
  </div>
</div>

<!-- ═══ OVERLAY: Cross-Community Chat ═══ -->
<div class="overlay-panel" id="overlayCrossChat">
  <div class="overlay-box" style="width:520px">
    <button class="overlay-close" onclick="App.closeOverlay('overlayCrossChat')">✕</button>
    <div id="crossChatBody"></div>
  </div>
</div>

<!-- Tooltip -->
<div id="graphTooltip"></div>

<!-- Toast Container -->
<div id="toastContainer" class="toast-container"></div>

<!-- JS Modules -->
<script src="js/api.js"></script>
<script src="js/chat.js"></script>
<script src="js/socket.js"></script>
<script src="js/graph.js"></script>
<script src="js/app.js"></script>

</body>
</html>
